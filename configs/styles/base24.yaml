system: "base24"
name: "nixxin"
author: "Islam Ahmed (https://github.com/SoftEng-Islam)"
variant: "dark"
palette:
  base00: "#191724" # (Background) - Default background (darker, near-black)
  base01: "#1f1d2e" # (Black - Lighter Background) (Used for status bars)
  base02: "#26233a" # (Bright Black) - Selection background
  base03: "#6e6a86" # (Grey) - Comments, Invisibles, Line Highlighting
  base04: "#908caa" # (Light Grey) - Dark Foreground (Used for status bars)
  base05: "#e0def4" # (Foreground) - Default Foreground, Caret, Delimiters, Operators
  base06: "#e0def4" # (White) - Light Foreground (Not often used)
  base07: "#524f67" # (Bright White) - The Lightest Foreground (Not often used)
  base08: "#e91e63" # (Red) - Variables, XML Tags, Markup Link Text, Markup Lists, Diff Deleted
  base09: "#ff9800" # (Orange) - Integers, Boolean, Constants, XML Attributes, Markup Link Url
  base0A: "#ffeb3b" # (Yellow) - Classes, Markup Bold, Search Text Background
  base0B: "#4caf50" # (Green) - Strings, Inherited Class, Markup Code, Diff Inserted
  base0C: "#00bcd4" # (Cyan) - Support, Regular Expressions, Escape Characters, Markup Quotes
  base0D: "#3f51b5" # (Blue) - Functions, Methods, Attribute IDs, Headings
  base0E: "#673ab7" # (Purple) - Keywords, Storage, Selector, Markup Italic, Diff Changed
  base0F: "#f44336" # (Dark Red or Brown) - Deprecated Highlighting for Methods and Functions, Opening/Closing Embedded Language Tags, e.g., <?php ?>