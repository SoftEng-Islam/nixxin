system: "base24"
name: "nixxin"
author: "Islam Ahmed (https://github.com/SoftEng-Islam)"
variant: "dark"
palette:
  base00: "#0A0A0A" # (Background) - Default background (darker, near-black)
  base01: "#171717" # (Black - Lighter Background) (Used for status bars)
  base02: "#262626" # (Bright Black) - Selection background
  base03: "#404040" # (Grey) - Comments, Invisibles, Line Highlighting
  base04: "#525252" # (Light Grey) - Dark Foreground (Used for status bars)
  base05: "#A3A3A3" # (Foreground) - Default Foreground, Caret, Delimiters, Operators
  base06: "#E5E5E5" # (White) - Light Foreground (Not often used)
  base07: "#FAFAFA" # (Bright White) - The Lightest Foreground (Not often used)
  base08: "#B91C1C" # (Red) - Variables, XML Tags, Markup Link Text, Markup Lists, Diff Deleted
  base09: "#C2410C" # (Orange) - Integers, Boolean, Constants, XML Attributes, Markup Link Url
  base0A: "#CA8A04" # (Yellow) - Classes, Markup Bold, Search Text Background
  base0B: "#15803D" # (Green) - Strings, Inherited Class, Markup Code, Diff Inserted
  base0C: "#0E7490" # (Cyan) - Support, Regular Expressions, Escape Characters, Markup Quotes
  base0D: "#1D4ED8" # (Blue) - Functions, Methods, Attribute IDs, Headings
  base0E: "#7E22CE" # (Purple) - Keywords, Storage, Selector, Markup Italic, Diff Changed
  base0F: "#500724" # (Dark Red or Brown) - Deprecated Highlighting for Methods and Functions, Opening/Closing Embedded Language Tags, e.g., <?php ?>