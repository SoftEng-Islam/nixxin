site_name: Nixxin Documentation
site_description: Comprehensive NixOS Enhancement Configurations
site_author: SoftEng-Islam
site_url: https://softeng-islam.github.io/nixxin/

repo_name: SoftEng-Islam/nixxin
repo_url: https://github.com/SoftEng-Islam/nixxin

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Configuration: getting-started/configuration.md
  - Modules:
      - Overview: modules/overview.md
      - Desktop Environment: modules/desktop.md
      - Development: modules/development.md
      - Gaming: modules/gaming.md
      - Media & Audio: modules/media.md
      - System Tools: modules/system.md
      - Security: modules/security.md
      - AI Tools: modules/ai.md
      - Mobile Development: modules/mobile.md
  - Configuration:
      - Hardware Support: configuration/hardware.md
      - User Management: configuration/users.md
      - Networking: configuration/networking.md
      - Themes & Appearance: configuration/themes.md
  - Advanced:
      - Custom Modules: advanced/custom-modules.md
      - Flake Management: advanced/flakes.md
      - Troubleshooting: advanced/troubleshooting.md
      - Performance Optimization: advanced/performance.md
  - Examples:
      - Basic Setup: examples/basic-setup.md
      - Development Machine: examples/development-machine.md
      - Gaming Rig: examples/gaming-rig.md
      - Server Configuration: examples/server.md
  - Contributing:
      - Guidelines: contributing/guidelines.md
      - Module Development: contributing/module-development.md
      - Documentation: contributing/documentation.md

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.tabbed
  - pymdownx.tasklist
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SoftEng-Islam/nixxin
    - icon: fontawesome/solid/envelope
      link: mailto:softeng@example.com
